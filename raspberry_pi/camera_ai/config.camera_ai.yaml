camera:
  device: "/dev/video0"
  backend: "v4l2"
  width: 320
  height: 240
  fps: 10
  fourcc: "MJPG"
  read_retries: 3
  retry_delay_sec: 0.1

inference:
  model_path: "models/yolo_bear_ncnn_model"
  fallback_model_paths:
    - "models/yolo_bear_int8.tflite"
    - "models/yolo_bear.onnx"
    - "models/yolo_bear.pt"
  input_size: 256
  confidence_floor: 0.05
  device: "cpu"
  class_ids: []
  inference_interval_sec: 0.75
  use_display: false

approach_detection:
  target_classes:
    - "bear"
  confidence_threshold: 0.50
  approach_area_ratio_threshold: 0.12
  consecutive_required: 3
  max_detection_age_sec: 2.0

output:
  jsonl_stdout: true
  save_csv: true
  csv_path: "data/logs/camera_ai_log.csv"
  save_debug_frames: false
  debug_frame_dir: "data/debug_frames"

fail_safe:
  default_ai_bear_approaching: false
